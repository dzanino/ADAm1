      attributeName="r"
      values="110; 120; 110; 100; 110"
      dur="8s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.2 0 0.8 1; 0.5 0 0.5 1"
    />
  </circle>

      attributeName="rx"
      values="20; 30; 20"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1"
    />
    <animate
      attributeName="ry"
      values="40; 60; 40"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="16s"
      repeatCount="indefinite"
    />
  </ellipse>
