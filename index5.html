<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Hlavná kružnica (rotuje) -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.7">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Deformovaná trajektória (linka kruhu) -->
  <path d="M250,30 A220,220 0 1,1 250,470 A220,220 0 1,1 250,30" fill="none" stroke="#4a6bff" stroke-width="1" opacity="0.5">
    <animate
      attributeName="d"
      values="M250,30 A220,220 0 1,1 250,470 A220,220 0 1,1 250,30;
              M250,30 A220,240 0 1,1 250,470 A220,200 0 1,1 250,30;
              M250,30 A220,220 0 1,1 250,470 A220,220 0 1,1 250,30"
      dur="8s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </path>

  <!-- Prvá bublina (vyklenutie) -->
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.8">
    <animate
      attributeName="ry"
      values="220; 260; 220"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>

  <!-- Druhá bublina (vyklenutie na inom mieste) -->
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.8">
    <animate
      attributeName="rx"
      values="220; 260; 220"
      dur="5s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1"
      begin="1s"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>

  <!-- Tretia bublina (nepravidelná deformácia) -->
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.8">
    <animate
      attributeName="ry"
      values="220; 180; 220; 250; 220"
      dur="6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
      begin="2s"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>

  <!-- Štvrtá bublina (efekt rozpínania) -->
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.8">
    <animate
      attributeName="rx"
      values="220; 240; 220; 200; 220"
      dur="7s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
      begin="3s"
    />
    <animate
      attributeName="ry"
      values="220; 200; 220; 240; 220"
      dur="7s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
      begin="3s"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>
</svg>
