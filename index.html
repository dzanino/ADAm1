<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Hlavná kružnica (rotuje) -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#4a6bff" stroke-width="2" opacity="0.7">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </circle>

  <!-- Deformovaná trajektória (linka kruhu) -->
  <path d="M250,50 A200,200 0 1,1 250,450 A200,200 0 1,1 250,50" fill="none" stroke="#4a6bff" stroke-width="1" opacity="0.5">
    <animate
      attributeName="d"
      values="M250,50 A200,200 0 1,1 250,450 A200,200 0 1,1 250,50;
              M250,50 A200,220 0 1,1 250,450 A200,180 0 1,1 250,50;
              M250,50 A200,200 0 1,1 250,450 A200,200 0 1,1 250,50"
      dur="8s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </path>

  <!-- Jemná ružová elipsa (bublina) -->
  <ellipse cx="250" cy="250" rx="200" ry="200" fill="none" stroke="#ffb3d1" stroke-width="2" opacity="0.8">
    <animate
      attributeName="ry"
      values="200; 240; 200; 160; 200"
      dur="6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animate
      attributeName="rx"
      values="200; 220; 200; 180; 200"
      dur="6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>
</svg>
