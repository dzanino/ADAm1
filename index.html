<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <circle cx="250" cy="250" r="220" fill="none" stroke="#4a6bff" stroke-width="4">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="4s"
      repeatCount="indefinite"
    />
    <animate
      attributeName="r"
      values="220; 220; 250; 220; 190; 220"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1; 0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animate
      attributeName="ry"
      values="220; 220; 220; 250; 220; 190"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1; 0.5 0 0.5 1; 0.5 0 0.5 1"
    />
  </circle>
  <ellipse cx="250" cy="250" rx="220" ry="220" fill="none" stroke="#ff6b4a" stroke-width="2" opacity="0">
    <animate
      attributeName="opacity"
      values="0; 0.8; 0"
      dur="4s"
      repeatCount="indefinite"
      begin="0s"
    />
    <animate
      attributeName="ry"
      values="220; 280; 220"
      dur="4s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.5 0 0.5 1; 0.5 0 0.5 1"
    />
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 250 250"
      to="360 250 250"
      dur="4s"
      repeatCount="indefinite"
    />
  </ellipse>
</svg>
